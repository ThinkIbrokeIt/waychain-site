<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 600" width="1920" height="600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f0f23"/>
      <stop offset="60%" stop-color="#2A2A2A"/>
      <stop offset="100%" stop-color="#1E1E1E"/>
    </linearGradient>
    <radialGradient id="pulse" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#B87333" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#B87333" stop-opacity="0"/>
    </radialGradient>
  </defs>
  
  <rect width="1920" height="600" fill="url(#bg)"/>
  
  <!-- Binary pulse waves -->
  <g stroke="#B87333" stroke-opacity="0.2" stroke-width="2">
    <path d="M0 250 Q480 230 960 270 T1920 230"/>
    <path d="M0 350 Q480 330 960 370 T1920 330"/>
  </g>
  
  <!-- Lighthouse with truth beacon -->
  <g transform="translate(960, 350)">
    <rect x="-25" y="-300" width="50" height="300" fill="#333" rx="3"/>
    <rect x="-30" y="-330" width="60" height="30" fill="#B87333" rx="3"/>
    <circle cx="0" cy="0" r="120" fill="url(#pulse)"/>
    <circle cx="0" cy="0" r="80" fill="none" stroke="#FFBF00" stroke-width="2" stroke-dasharray="10,5"/>
    
    <!-- 369 binary pattern -->
    <g font-family="SF Mono" font-size="12" fill="#FFF8F0" text-anchor="middle">
      <text x="-20" y="-15">3 · 6 · 9</text>
      <text x="0" y="5" font-size="24" fill="#B87333" font-family="'Playfair Display',Georgia">⃝</text>
    </g>
  </g>
  
  <!-- Truth anchors (hexagons along bottom) -->
  <g transform="translate(400, 480)" fill="none" stroke="#B87333" stroke-width="1.5">
    <polygon points="30,5 90,5 120,37 90,69 30,69 0,37"/>
    <text x="75" y="42" font-family="Inter" font-size="12" fill="#FFBF00" text-anchor="middle">BIJO</text>
  </g>
  
  <g transform="translate(1400, 480)" fill="none" stroke="#FFBF00" stroke-width="1.5">
    <polygon points="40,5 100,5 130,40 100,75 40,75 10,40"/>
    <text x="85" y="82" font-family="Inter" font-size="12" fill="#B87333" text-anchor="middle">DEAD MAN</text>
  </g>
  
  <!-- Title -->
  <g transform="translate(960, 180)">
    <text x="0" y="0" font-family="'Playfair Display',Georgia,serif" font-size="64" fill="#FFF8F0" text-anchor="middle" font-weight="400">BINARY JOURNAL</text>
    <text x="0" y="40" font-family="Inter" font-size="20" fill="#B87333" text-anchor="middle" letter-spacing="4">3 · 6 · 9 — The Key to the Universe</text>
    <text x="0" y="70" font-family="Inter" font-size="14" fill="#9A9A9A" text-anchor="middle">Immutable truth anchoring. Dead Man's Switch inheritance.</text>
  </g>
  
  <!-- Grid -->
  <g stroke="#3A3A3A" stroke-opacity="0.15" stroke-width="1">
    <line x1="400" y1="0" x2="400" y2="600"/>
    <line x1="800" y1="0" x2="800" y2="600"/>
    <line x1="1200" y1="0" x2="1200" y2="600"/>
    <line x1="1600" y1="0" x2="1600" y2="600"/>
  </g>
</svg>