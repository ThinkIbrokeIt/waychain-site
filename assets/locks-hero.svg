<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 600" width="1920" height="600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d0d20"/>
      <stop offset="60%" stop-color="#2A2A2A"/>
      <stop offset="100%" stop-color="#1E1E1E"/>
    </linearGradient>
    <linearGradient id="chain" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#B87333"/>
      <stop offset="100%" stop-color="#FFBF00"/>
    </linearGradient>
  </defs>
  
  <rect width="1920" height="600" fill="url(#bg)"/>
  
  <!-- Chain link waves -->
  <g stroke="#B87333" stroke-opacity="0.15" stroke-width="3">
    <path d="M0 280 Q480 260 960 300 T1920 260"/>
    <path d="M0 320 Q480 300 960 340 T1920 300"/>
  </g>
  
  <!-- Central lock / chain motif -->
  <g transform="translate(960, 340)">
    <!-- Lock shackle -->
    <path d="M-60 -20 C-40 -60 40 -60 60 -20" fill="none" stroke="#FFBF00" stroke-width="6" stroke-linecap="round"/>
    <!-- Lock body -->
    <rect x="-80" y="0" width="160" height="80" rx="8" fill="#2A2A2A" stroke="#3A3A3A"/>
    <!-- Keyhole -->
    <circle cx="0" cy="40" r="12" fill="#1E1E1E" stroke="#B87333" stroke-width="2"/>
    <path d="M-4 40 V65" stroke="#B87333" stroke-width="3" stroke-linecap="round"/>
    
    <!-- Clock ticks (vesting schedule visualization) -->
    <g stroke="#B87333" stroke-opacity="0.5" stroke-width="2">
      <line x1="-60" y1="20" x2="-55" y2="15"/>
      <line x1="-45" y1="10" x2="-40" y2="10"/>
      <line x1="0" y1="-40" x2="0" y2="-35"/>
      <line x1="45" y1="10" x2="50" y2="10"/>
      <line x1="60" y1="20" x2="55" y2="15"/>
    </g>
  </g>
  
  <!-- LP token symbols -->
  <g transform="translate(350, 200)">
    <g fill="none" stroke="#B87333" stroke-width="2">
      <polygon points="40,5 100,5 130,37 100,69 40,69 10,37"/>
    </g>
    <text x="85" y="80" font-family="Inter" font-size="14" fill="#FFBF00" text-anchor="middle">WAY</text>
  </g>
  
  <g transform="translate(1500, 200)">
    <g fill="none" stroke="#FFBF00" stroke-width="2">
      <polygon points="40,5 100,5 130,37 100,69 40,69 10,37"/>
    </g>
    <text x="85" y="80" font-family="Inter" font-size="14" fill="#B87333" text-anchor="middle">2WAY</text>
  </g>
  
  <!-- Title -->
  <g transform="translate(960, 160)">
    <text x="0" y="0" font-family="'Playfair Display',Georgia,serif" font-size="64" fill="#FFF8F0" text-anchor="middle" font-weight="400">TRUSTLESS LOCK</text>
    <text x="0" y="40" font-family="Inter" font-size="20" fill="#B87333" text-anchor="middle" letter-spacing="4">Anti-rug liquidity protection</text>
    <text x="0" y="70" font-family="Inter" font-size="14" fill="#9A9A9A" text-anchor="middle">98/2 revenue share • Self-sustaining • No admin keys</text>
  </g>
  
  <!-- Revenue split visualization -->
  <g transform="translate(960, 460)">
    <text x="0" y="0" font-family="Inter" font-size="14" fill="#FFBF00" text-anchor="middle">98% to LPs • 2% to protocol</text>
    <rect x="-180" y="20" width="360" height="12" rx="6" fill="#333">
      <rect width="352.8" height="12" rx="6" fill="url(#chain)"/>
    </rect>
  </g>
  
  <!-- Grid -->
  <g stroke="#3A3A3A" stroke-opacity="0.15" stroke-width="1">
    <line x1="400" y1="0" x2="400" y2="600"/>
    <line x1="800" y1="0" x2="800" y2="600"/>
    <line x1="1200" y1="0" x2="1200" y2="600"/>
    <line x1="1600" y1="0" x2="1600" y2="600"/>
  </g>
</svg>