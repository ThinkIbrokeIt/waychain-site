<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dox_Dev Badge - WayChain</title>
<style>
:root { --warm:#FFF8F0; --slate:#2A2A2A; --copper:#B87333; --amber:#FFBF00; }
* { margin:0; padding:0; box-sizing:border-box; }
body { 
  font-family: 'Inter', sans-serif; 
  background: var(--slate); 
  color: var(--warm); 
  padding: 40px 20px;
}
.container { max-width: 600px; margin: 0 auto; text-align: center; }
.badge { 
  width: 120px; height: 120px; border-radius: 50%; 
  background: radial-gradient(circle, var(--copper), var(--amber));
  margin: 0 auto 20px; display: flex; align-items: center; justify-content: center;
  font-size: 48px; font-weight: 700; color: var(--warm);
}
.level { font-size: 24px; font-weight: 700; color: var(--copper); margin-bottom: 10px; }
.tagline { color: #9A9A9A; font-size: 14px; margin-bottom: 30px; }
.features { display: grid; gap: 15px; margin-top: 30px; }
.feature { background: var(--slate); border: 1px solid var(--copper); border-radius: 8px; padding: 15px; text-align: left; }
.feature h3 { font-size: 16px; color: var(--amber); margin-bottom: 5px; }
.feature p { font-size: 13px; color: #9A9A9A; }
</style>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
<div class="container">
  <div class="badge">△</div>
  <h1>Dox_Dev Badge</h1>
  <p class="tagline">Soulbound identity. One human, one voice.</p>
  
  <div class="features">
    <div class="feature">
      <h3>Level I: Lantern</h3>
      <p>Basic verification. Entry-level participation.</p>
    </div>
    <div class="feature">
      <h3>Level II: Compass</h3>
      <p>100 WAY bond + 2 endorsements. Deploy contracts.</p>
    </div>
    <div class="feature">
      <h3>Level III: Lighthouse</h3>
      <p>5,000 WAY bond. Curator. Governance rights.</p>
    </div>
  </div>
  
  <p style="margin-top:30px;font-size:12px;color:#9A9A9A">waychain.org/badge</p>
</div>
</body>
</html>
