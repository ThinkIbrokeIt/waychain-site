<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WIFR Leaderboard — Claim Race</title>
<style>
:root { --warm:#FFF8F0; --slate:#2A2A2A; --copper:#B87333; --amber:#FFBF00; --green:#4CAF50; }
* { margin:0; padding:0; box-sizing:border-box; font-family: 'Inter', sans-serif; }
body { background: var(--slate); color: var(--warm); padding: 40px 20px; }
.container { max-width: 700px; margin: 0 auto; }
h1 { color: var(--copper); margin-bottom: 20px; }
.leaderboard { 
  background: #1e1e1e; 
  border: 1px solid var(--copper); 
  border-radius: 8px; 
  overflow: hidden;
}
.row { 
  display: flex; justify-content: space-between; 
  padding: 12px 15px; 
  border-bottom: 1px solid #333; 
  font-family: monospace;
}
.row:last-child { border-bottom: none; }
.rank { color: var(--amber); width: 40px; }
.addr { flex: 1; }
.claim { color: var(--green); }
.header { 
  background: #1a1a1a; 
  color: var(--amber); 
  font-weight: 600;
}
.countdown { 
  text-align: center; margin: 20px 0; 
  padding: 15px; background: var(--amber);
  color: var(--slate); border-radius: 6px; font-weight: 600;
}
</style>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
<div class="container">
  <h1>WIFR Leaderboard</h1>
  
  <div class="countdown">Early Worm Bonus: 9,847/10,000 spots remaining</div>
  
  <div class="leaderboard">
    <div class="row header">
      <div class="rank">#</div>
      <div class="addr">Address</div>
      <div class="claim">Claimed</div>
    </div>
    <div class="row" style="opacity:0.5">
      <div class="rank">1</div>
      <div class="addr">7x8...9f2a</div>
      <div class="claim">2,000 WAY</div>
    </div>
    <div class="row" style="opacity:0.5">
      <div class="rank">2</div>
      <div class="addr">3mK...1b5c</div>
      <div class="claim">1,000 WAY</div>
    </div>
    <div class="row" style="opacity:0.5">
      <div class="rank">3</div>
      <div class="addr">9qR...4e7d</div>
      <div class="claim">2,000 WAY</div>
    </div>
  </div>
  
  <p style="margin-top:20px;font-size:14px;color:#9A9A9A">
    Live from WayChain explorer. Pool values resolve against the current runtime. Ratio: 1,000 WIFR = 1 WAY.
  </p>
</div>
</body>
</html>
